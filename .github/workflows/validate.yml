name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout module
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: gma-module-files
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout framework
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: SadPossum/gma-framework
          ref: ${{ github.event_name == 'push' && github.ref_name == 'main' && 'main' || 'dev' }}
          path: gma-framework
          token: ${{ secrets.GMA_CI_TOKEN || github.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Bootstrap source roots
        shell: pwsh
        working-directory: gma-module-files
        run: ./eng/bootstrap-source-roots.ps1 -Force

      - name: Restore
        working-directory: gma-module-files
        run: dotnet restore Gma.Modules.Files.slnx

      - name: Build
        working-directory: gma-module-files
        run: dotnet build Gma.Modules.Files.slnx --no-restore -m:1

      - name: Check boundaries
        shell: pwsh
        working-directory: gma-module-files
        run: ./eng/check-boundaries.ps1

      - name: Test
        working-directory: gma-module-files
        run: dotnet test Gma.Modules.Files.slnx --no-build --logger "console;verbosity=minimal"

      - name: Audit packages
        working-directory: gma-module-files
        run: dotnet list Gma.Modules.Files.slnx package --vulnerable --include-transitive
